# Production-style stack: infra + all four Clariodesk runtimes.
# Configure secrets via an .env file next to this compose file.
x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgres://clariodesk:${POSTGRES_PASSWORD:-clariodesk}@postgres:5432/clariodesk
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://minio:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: ${MINIO_USER:-clariodesk}
  S3_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-clariodesk-secret}
  S3_BUCKET_MEDIA: clariodesk-media
  S3_BUCKET_RAW_EVENTS: clariodesk-raw-events
  S3_FORCE_PATH_STYLE: "true"
  JWT_SECRET: ${JWT_SECRET:?set a strong JWT_SECRET}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY (openssl rand -base64 32)}
  GATEWAY_WEBHOOK_SECRET: ${GATEWAY_WEBHOOK_SECRET:?set a webhook secret}
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  CLARIO_GATEWAY_BASE_URL: http://gateway:2786
  CLARIO_GATEWAY_API_KEY: ${CLARIO_GATEWAY_API_KEY:?set CLARIO_GATEWAY_API_KEY}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clariodesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clariodesk}
      POSTGRES_DB: clariodesk
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clariodesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redisdata:/data]

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-clariodesk}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-clariodesk-secret}
    volumes: [miniodata:/data]

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      NODE_ENV: production
      CLARIO_GATEWAY_PORT: 2786
      CLARIO_GATEWAY_BASE_URL: http://gateway:2786
      CLARIO_GATEWAY_API_KEY: ${CLARIO_GATEWAY_API_KEY:?set CLARIO_GATEWAY_API_KEY}
      CLARIO_GATEWAY_DATA_DIR: /data/clario-gateway
      CLARIO_API_WEBHOOK_BASE_URL: http://api:4000/api
      CLARIO_GATEWAY_WEBHOOK_SECRET: ${GATEWAY_WEBHOOK_SECRET:?set a webhook secret}
    command: ["node", "apps/gateway/dist/index.js"]
    volumes: [gatewaydata:/data/clario-gateway]
    ports: ["2786:2786"]

  # Runs migrations once, then exits.
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment: *app-env
    command: ["npm", "run", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment: *app-env
    command: ["node", "apps/api/dist/main.js"]
    ports: ["4000:4000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      gateway:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment: *app-env
    command: ["node", "apps/worker/dist/index.js"]
    depends_on: [postgres, redis, minio, gateway]

  realtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment: *app-env
    command: ["node", "apps/realtime/dist/index.js"]
    ports: ["4001:4001"]
    depends_on: [postgres, redis]

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment: *app-env
    command: ["node", "apps/scheduler/dist/index.js"]
    depends_on: [postgres, redis, minio]

volumes:
  pgdata:
  redisdata:
  miniodata:
  gatewaydata:
